
<style>
  :root {
    --sp-bg: #0c0e14;
    --sp-surface: #12151e;
    --sp-surface2: #181c27;
    --sp-border: rgba(255,255,255,0.07);
    --sp-border2: rgba(255,255,255,0.12);
    --sp-text: #e8edf5;
    --sp-muted: #7a8799;
    --sp-dim: #3d4758;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { background: transparent; }

  .sp-shell {
    background: var(--sp-bg);
    border-radius: 18px;
    border: 1px solid var(--sp-border);
    overflow: hidden;
    font-family: var(--font-sans, system-ui, sans-serif);
    color: var(--sp-text);
    min-height: 620px;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .sp-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 18px;
    height: 46px;
    border-bottom: 1px solid var(--sp-border);
    background: rgba(0,0,0,0.28);
    flex-shrink: 0;
  }
  .sp-topbar-dot { width: 10px; height: 10px; border-radius: 50%; }
  .sp-topbar-logo { font-size: 13px; font-weight: 500; letter-spacing: 0.04em; color: var(--sp-text); margin-left: 4px; }
  .sp-topbar-logo span { color: var(--sp-muted); }
  .sp-topbar-sep { flex: 1; }
  .sp-engine-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 99px;
    border: 1px solid var(--sp-border2);
    background: rgba(255,255,255,0.04);
    font-size: 11px; color: var(--sp-muted); cursor: default;
  }
  .sp-engine-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; }

  /* BODY */
  .sp-body { display: flex; flex: 1; min-height: 0; }

  /* SIDEBAR */
  .sp-sidebar {
    width: 56px;
    border-right: 1px solid var(--sp-border);
    background: rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
    flex-shrink: 0;
  }
  .sp-nav-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 120ms;
  }
  .sp-nav-btn:hover { background: rgba(255,255,255,0.06); }
  .sp-nav-btn.active { background: rgba(255,255,255,0.09); }
  .sp-nav-btn.active::before {
    content: '';
    position: absolute;
    left: -1px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 22px;
    border-radius: 0 3px 3px 0;
  }
  .sp-nav-btn svg { width: 16px; height: 16px; }

  /* NAV COLORS */
  .nav-operator svg { stroke: #60a5fa; }
  .nav-operator.active::before { background: #60a5fa; }
  .nav-findings svg { stroke: #f87171; }
  .nav-findings.active::before { background: #f87171; }
  .nav-seo svg { stroke: #34d399; }
  .nav-seo.active::before { background: #34d399; }
  .nav-compare svg { stroke: #a78bfa; }
  .nav-compare.active::before { background: #a78bfa; }
  .nav-memory svg { stroke: #38bdf8; }
  .nav-memory.active::before { background: #38bdf8; }
  .nav-healing svg { stroke: #86efac; }
  .nav-healing.active::before { background: #86efac; }
  .nav-reports svg { stroke: #f9a8d4; }
  .nav-reports.active::before { background: #f9a8d4; }
  .nav-settings svg { stroke: #94a3b8; }
  .nav-settings.active::before { background: #94a3b8; }

  .sp-nav-btn svg { fill: none; stroke: var(--sp-dim); stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; transition: stroke 120ms; }
  .sp-nav-btn:hover svg, .sp-nav-btn.active svg { opacity: 1; }

  .sp-nav-label {
    font-size: 9px; letter-spacing: 0.04em; color: var(--sp-muted);
    text-align: center; margin-top: 2px;
    display: none;
  }
  .sp-sidebar-spacer { flex: 1; }

  /* MAIN */
  .sp-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  /* COMMAND DOCK */
  .sp-dock {
    padding: 10px 16px;
    border-bottom: 1px solid var(--sp-border);
    background: rgba(0,0,0,0.22);
    display: grid;
    grid-template-columns: 200px 1fr 110px 68px;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .sp-input-wrap { position: relative; }
  .sp-input-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: none; stroke: var(--sp-muted); stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
  .sp-input {
    width: 100%; height: 38px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--sp-border2);
    border-radius: 12px;
    padding: 0 10px 0 32px;
    font-size: 12px; color: var(--sp-text);
    outline: none; font-family: inherit;
    transition: border-color 140ms, background 140ms;
  }
  .sp-input::placeholder { color: var(--sp-muted); }
  .sp-input:focus { border-color: rgba(96,165,250,0.4); background: rgba(255,255,255,0.07); }
  .sp-run-btn {
    height: 38px; border-radius: 12px;
    border: 1px solid rgba(52,211,153,0.3);
    background: rgba(52,211,153,0.1);
    color: #6ee7b7; font-size: 11px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    cursor: pointer; transition: all 120ms; white-space: nowrap;
    font-family: inherit;
  }
  .sp-run-btn:hover { background: rgba(52,211,153,0.16); border-color: rgba(52,211,153,0.45); transform: translateY(-1px); }
  .sp-run-btn svg { width: 13px; height: 13px; fill: none; stroke: #6ee7b7; stroke-width: 2; }
  .sp-ask-btn {
    height: 38px; border-radius: 12px;
    border: 1px solid rgba(96,165,250,0.3);
    background: rgba(96,165,250,0.1);
    color: #93c5fd; font-size: 11px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    cursor: pointer; transition: all 120ms;
    font-family: inherit;
  }
  .sp-ask-btn:hover { background: rgba(96,165,250,0.16); transform: translateY(-1px) scale(1.02); }
  .sp-ask-btn svg { width: 13px; height: 13px; fill: none; stroke: #93c5fd; stroke-width: 2; }

  /* WORKSPACE AREA */
  .sp-workspace { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .sp-workspace::-webkit-scrollbar { width: 4px; }
  .sp-workspace::-webkit-scrollbar-thumb { background: var(--sp-dim); border-radius: 2px; }

  /* WORKSPACE SHELL */
  .sp-ws-shell {
    border-radius: 20px;
    border: 1px solid var(--sp-border);
    overflow: hidden;
    position: relative;
  }
  .sp-ws-glow {
    position: absolute; inset: 0; pointer-events: none;
    opacity: 0.8;
  }
  .sp-ws-content { position: relative; z-index: 1; padding: 18px; }

  /* HERO GRID */
  .sp-hero-grid { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 10px; }
  .sp-metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
  .sp-groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }

  /* CARD */
  .sp-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--sp-border);
    border-radius: 14px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }
  .sp-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 30%);
    pointer-events: none;
  }

  .sp-kicker { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sp-muted); }
  .sp-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 99px;
    border: 1px solid var(--sp-border2);
    background: rgba(255,255,255,0.04);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #c0cad7;
    margin-top: 8px;
  }
  .sp-badge .pulse {
    width: 7px; height: 7px; border-radius: 50%; position: relative;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .sp-badge .pulse::before {
    content: ''; position: absolute; inset: -2px;
    border-radius: 50%; background: inherit; opacity: 0.4;
    animation: ping 1.6s ease-out infinite;
  }
  @keyframes ping { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(2.2); opacity: 0; } }

  .sp-ws-title { font-size: 22px; font-weight: 500; letter-spacing: -0.04em; color: var(--sp-text); margin-top: 10px; line-height: 1.2; }
  .sp-ws-desc { font-size: 12px; line-height: 1.7; color: var(--sp-muted); margin-top: 6px; max-width: 480px; }

  .sp-seg-tabs { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .sp-seg-tab {
    padding: 4px 10px; border-radius: 99px;
    border: 1px solid var(--sp-border2);
    background: rgba(255,255,255,0.03);
    font-size: 11px; color: #c0cad7; cursor: pointer;
    transition: all 100ms;
  }
  .sp-seg-tab.active { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.08); color: var(--sp-text); }

  .sp-big-num { font-size: 28px; font-weight: 500; letter-spacing: -0.05em; color: var(--sp-text); line-height: 1; margin-top: 8px; }
  .sp-num-detail { font-size: 11px; color: var(--sp-muted); margin-top: 4px; }

  .sp-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .sp-list-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 9px 11px; border-radius: 10px;
    border: 1px solid var(--sp-border);
    background: rgba(255,255,255,0.02);
    transition: all 120ms; cursor: default;
  }
  .sp-list-item:hover { border-color: var(--sp-border2); background: rgba(255,255,255,0.04); transform: translateY(-1px); }
  .sp-list-idx {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #dbeafe;
    background: rgba(59,130,246,0.16); border: 1px solid rgba(59,130,246,0.2);
  }
  .sp-list-title { font-size: 12px; font-weight: 500; color: var(--sp-text); }
  .sp-list-detail { font-size: 11px; color: var(--sp-muted); margin-top: 2px; line-height: 1.5; }
  .sp-action-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 99px; margin-top: 5px;
    border: 1px solid rgba(96,165,250,0.25);
    background: rgba(59,130,246,0.1);
    font-size: 10px; color: #bfdbfe;
    cursor: pointer; transition: all 100ms;
    font-family: inherit;
  }
  .sp-action-btn:hover { background: rgba(59,130,246,0.16); border-color: rgba(96,165,250,0.38); }

  .sp-zone-title { font-size: 14px; font-weight: 500; color: var(--sp-text); margin-top: 4px; }
  .sp-zone-subtitle { font-size: 11px; color: var(--sp-muted); margin-top: 2px; line-height: 1.5; }

  /* AI DOCK */
  .sp-ai-dock {
    border-top: 1px solid var(--sp-border);
    background: rgba(0,0,0,0.22);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .sp-ai-mode {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 99px;
    border: 1px solid rgba(96,165,250,0.25);
    background: rgba(59,130,246,0.08);
    font-size: 10px; color: #93c5fd; white-space: nowrap;
  }
  .sp-ai-mode .dot { width: 5px; height: 5px; border-radius: 50%; background: #60a5fa; }
  .sp-chat-preview { font-size: 12px; color: var(--sp-muted); flex: 1; }
  .sp-chat-preview strong { color: var(--sp-text); font-weight: 500; }

  /* TOOLTIPS */
  .sp-nav-btn { position: relative; }
  .sp-tooltip {
    position: absolute; left: 100%; top: 50%; transform: translateY(-50%);
    margin-left: 10px; padding: 4px 8px; border-radius: 6px;
    background: rgba(20,24,36,0.96); border: 1px solid var(--sp-border2);
    font-size: 11px; color: var(--sp-text); white-space: nowrap;
    opacity: 0; pointer-events: none; z-index: 100;
    transition: opacity 100ms;
  }
  .sp-nav-btn:hover .sp-tooltip { opacity: 1; }

  @media (max-width: 640px) {
    .sp-hero-grid { grid-template-columns: 1fr; }
    .sp-metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .sp-groups-grid { grid-template-columns: 1fr; }
    .sp-dock { grid-template-columns: 1fr 80px; }
    .sp-dock > *:first-child, .sp-dock > *:last-child { display: none; }
  }
</style>

let activeView = 'operator';

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderWorkspace(key) {
  const ws = WORKSPACES[key];
  if (!ws) return '';
  const { theme, badge, eyebrow, title, desc, tabs, metrics, left, right, groups } = ws;

  const metricsHtml = metrics.map(m => `
    <div class="sp-card" style="padding:12px">
      <div class="sp-kicker">${esc(m.label)}</div>
      <div class="sp-big-num">${esc(m.value)}</div>
      <div class="sp-num-detail">${esc(m.detail)}</div>
    </div>
  `).join('');

  const listHtml = (items) => items.map((item, i) => `
    <div class="sp-list-item">
      <div class="sp-list-idx">${i+1}</div>
      <div>
        <div class="sp-list-title">${esc(item.t || item.title || '')}</div>
        <div class="sp-list-detail">${esc(item.d || item.detail || '')}</div>
      </div>
    </div>
  `).join('');

  const groupsHtml = groups.map(g => `
    <div class="sp-card">
      <div class="sp-kicker">Zone</div>
      <div class="sp-zone-title">${esc(g.title)}</div>
      <div class="sp-zone-subtitle">Dedicated cluster with its own role inside the workspace.</div>
      <div class="sp-list" style="margin-top:10px">${g.items.map(item => `
        <div class="sp-list-item">
          <div>
            <div class="sp-list-title">${esc(item.l)}</div>
            <div class="sp-list-detail">${esc(item.s)}</div>
            ${item.a ? `<button class="sp-action-btn" data-nav="${esc(item.a)}">Open →</button>` : ''}
          </div>
        </div>
      `).join('')}</div>
    </div>
  `).join('');

  const tabsHtml = tabs.map((t, i) => `<span class="sp-seg-tab ${i===0?'active':''}">${esc(t)}</span>`).join('');

  return `
    <div class="sp-ws-shell">
      <div class="sp-ws-glow" style="background: radial-gradient(circle at top left, ${theme.from}, transparent 32%), radial-gradient(circle at top right, ${theme.via}, transparent 30%)"></div>
      <div class="sp-ws-content">

        <div class="sp-hero-grid">
          <div class="sp-card">
            <div class="sp-kicker">${esc(eyebrow)}</div>
            <div class="sp-badge" style="background:${badge.bg};border-color:${badge.accent}33;color:${badge.color}">
              <span class="pulse" style="background:${badge.accent};width:7px;height:7px;border-radius:50%"></span>
              ${esc(badge.label)}
            </div>
            <div class="sp-ws-title">${esc(title)}</div>
            <div class="sp-ws-desc">${esc(desc)}</div>
            <div class="sp-seg-tabs">${tabsHtml}</div>
          </div>

          <div class="sp-card">
            <div class="sp-kicker">Live posture</div>
            <div class="sp-list" style="margin-top:10px">
              <div class="sp-list-item"><div><div class="sp-list-title">Target</div><div class="sp-list-detail" id="liveTarget">https://example.com</div></div></div>
              <div class="sp-list-item"><div><div class="sp-list-title">Execution profile</div><div class="sp-list-detail">Mode full · scope site · depth default</div></div></div>
              <div class="sp-list-item"><div><div class="sp-list-title">Signal pulse</div><div class="sp-list-detail">SEO rising · Runtime stable · UX stable</div></div></div>
            </div>
          </div>
        </div>

        <div class="sp-metrics-grid" style="margin-top:10px">${metricsHtml}</div>

        <div class="sp-groups-grid" style="margin-top:10px">
          <div class="sp-card">
            <div class="sp-kicker">Group</div>
            <div class="sp-zone-title">${esc(left.title)}</div>
            <div class="sp-list" style="margin-top:10px">${listHtml(left.items)}</div>
          </div>
          <div class="sp-card">
            <div class="sp-kicker">Group</div>
            <div class="sp-zone-title">${esc(right.title)}</div>
            <div class="sp-list" style="margin-top:10px">${listHtml(right.items)}</div>
          </div>
        </div>

        <div class="sp-groups-grid" style="margin-top:10px">${groupsHtml}</div>

      </div>
    </div>
  `;
}

function switchView(key) {
  if (!WORKSPACES[key]) return;
  activeView = key;

  document.querySelectorAll('.sp-nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === key);
  });

  const area = document.getElementById('workspaceArea');
  area.innerHTML = renderWorkspace(key);

  area.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.nav));
  });

  const urlInput = document.getElementById('urlInput');
  const target = area.querySelector('#liveTarget');
  if (target && urlInput && urlInput.value) target.textContent = urlInput.value;
}

document.querySelectorAll('.sp-nav-btn[data-view]').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

document.getElementById('runBtn').addEventListener('click', () => {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { document.getElementById('urlInput').focus(); return; }
  switchView('operator');
  document.querySelector('.sp-chat-preview').innerHTML = `<strong>Assistant →</strong> Iniciando run audit em <strong>${url}</strong> — modo full, scope site. Analisando rotas, issues e SEO em tempo real...`;
});

document.getElementById('askBtn').addEventListener('click', () => {
  const q = document.getElementById('chatInput').value.trim();
  if (q) sendPrompt('No contexto do SitePulse Studio: ' + q);
});

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('askBtn').click();
});

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('runBtn').click();
});

switchView('operator');
</script>
