<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SitePulse Studio v3.0</title>
    <meta name="description" content="O Oráculo Cibernético - 10 Motores de IA Supremos" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Critical CSS para evitar flash */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0B0D12;
        color: #F0F4F8;
        overflow: hidden;
      }
      
      /* Loading state */
      .loading-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #0B0D12;
      }
      
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 2px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366F1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen será substituída pelo React -->
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <!-- Script será injetado pelo build -->
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
