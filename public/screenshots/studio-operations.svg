<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">SitePulse Studio Operations Preview</title>
  <desc id="desc">Dashboard mock showing live operations, status cards and timeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07172F" />
      <stop offset="100%" stop-color="#041022" />
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="#020814" />
  <rect x="44" y="40" width="1192" height="720" rx="20" fill="url(#bg)" stroke="#1D3D66" />
